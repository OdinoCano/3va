[package]
name = "vvva-rquickjs"
version = "0.6.2"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "High-level QuickJS bindings used by the 3va runtime (re-exports vvva-rquickjs-core + rquickjs-macro)"
keywords = ["quickjs", "javascript", "3va", "runtime"]
categories = ["api-bindings"]
repository = "https://github.com/OdinoCano/3va"
homepage = "https://github.com/OdinoCano/3va"

# vvva-rquickjs-core is referenced as "rquickjs-core" so that any generated
# code from rquickjs-macro (which emits ::rquickjs_core:: paths) resolves correctly.
[dependencies.rquickjs-core]
package = "vvva-rquickjs-core"
version = "0.6.2"
path = "../rquickjs-core"

[dependencies.rquickjs-macro]
version = "0.6.2"

# Mirror the feature flags of rquickjs-core so callers can use the same names.
[features]
default = []
full            = ["rquickjs-core/full"]
full-async      = ["rquickjs-core/full-async"]
parallel        = ["rquickjs-core/parallel"]
loader          = ["rquickjs-core/loader"]
dyn-load        = ["rquickjs-core/dyn-load"]
allocator       = ["rquickjs-core/allocator"]
rust-alloc      = ["rquickjs-core/rust-alloc"]
classes         = ["rquickjs-core/classes"]
properties      = ["rquickjs-core/properties"]
array-buffer    = ["rquickjs-core/array-buffer"]
futures         = ["rquickjs-core/futures"]
multi-ctx       = ["rquickjs-core/multi-ctx"]
bindgen         = ["rquickjs-core/bindgen"]
