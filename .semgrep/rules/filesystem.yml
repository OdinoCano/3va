rules:
  - id: no-std-fs-without-validation
    pattern: std::fs::read_to_string(...)
    message: "std::fs::read_to_string detectado. Asegurar validación de path y sandbox."
    severity: WARNING
    languages: [rust]
    paths:
      include:
        - crates/core/**
        - crates/pm/**

  - id: no-std-fs-write
    pattern: std::fs::write(...)
    message: "std::fs::write detectado. Validar path y usar sandbox."
    severity: WARNING
    languages: [rust]

  - id: no-std-fs-read-dir
    pattern: std::fs::read_dir(...)
    message: "std::fs::read_dir detectado. Validar path antes de usar."
    severity: WARNING
    languages: [rust]

  - id: no-tokio-process
    pattern: tokio::process::Command
    message: "tokio::process::Command detectado. Validar entrada y usar sandboxing."
    severity: WARNING
    languages: [rust]