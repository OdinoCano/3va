[workspace]
resolver = "2"
members = [
    "crates/*",
    "crates/bundler",
    "crates/crypto",
    "crates/test",
    "crates/wasm"
]

[workspace.dependencies]
tokio = { version = "1.37", features = ["full"] }
clap = { version = "4.5", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rquickjs = { version = "0.6", features = ["full-async", "parallel"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
anyhow = "1.0"
thiserror = "1.0"
url = "2.5"
base64 = "0.22"
sha2 = { version = "0.10", features = ["oid"] }
sha1 = { version = "0.10", features = ["oid"] }
hmac = "0.12"
rand = "0.8"
pbkdf2 = "0.12"
scrypt = "0.11"
tempfile = "3.8"
ureq = { version = "2", features = ["json"] }
tungstenite = { version = "0.24", features = ["native-tls"] }
flate2 = "1.0"
wasmtime = "36.0"
wasmtime-wasi = "36.0"
wat = "1.0"
ml-kem = { version = "0.3", features = ["getrandom"] }
ml-dsa = { version = "0.1", features = ["getrandom"] }
aes-gcm = "0.10"
native-tls = "0.2"
rsa = "0.9"
p256 = { version = "0.13", features = ["pkcs8", "ecdsa"] }
p384 = { version = "0.13", features = ["pkcs8", "ecdsa"] }
md-5 = "0.10"


[profile.release]
opt-level = 3
lto = "thin"

[patch.crates-io]
rquickjs-sys = { path = "vendor/rquickjs-sys" }
