[advisories]
ignore = [
    # fxhash is unmaintained; pulled in as transitive dep by wasmtime — no active CVE
    "RUSTSEC-2025-0057",
    # rustls-pemfile: no longer maintained; pulled in as transitive dep by tonic.
    # No safe upgrade available. See deny.toml for the full rationale.
    "RUSTSEC-2025-0134",
    # rsa 0.9: Marvin Attack (PKCS#1 v1.5 decryption timing oracle, CVE-2023-49092).
    # 3va uses rsa ONLY for signing (createSign) and verification (createVerify);
    # RsaPrivateKey::decrypt() is never called — the vulnerable code path is
    # unreachable. See deny.toml for the full rationale and upgrade tracking.
    "RUSTSEC-2023-0071",
    # paste: unmaintained (archived by author). Direct dependency of the `v8`
    # crate itself, not something we can swap out.
    "RUSTSEC-2024-0436",
]
