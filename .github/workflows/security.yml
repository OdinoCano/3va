name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unsafe-code inventory (informational, never blocks) ──────────────────────
  unsafe-audit:
    name: Unsafe Code Inventory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Run cargo-geiger
        run: cargo geiger 2>&1 || true

  # ── Semgrep SAST scan (blocks on ERROR-severity findings) ───────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: |
          if [ -d .semgrep/rules ]; then
            semgrep --config .semgrep/rules/ --severity ERROR --error .
          else
            echo "No local Semgrep rules found — skipping custom rules."
          fi

  # ── Capability / sandbox security tests ─────────────────────────────────────
  # These are real tests in the test suite, not optional.
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run capability and sandbox tests
        run: cargo test -p vvva_permissions

  # ── Fuzzing (scheduled only, experimental) ───────────────────────────────────
  fuzzing:
    name: Fuzzing (30 s per target)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets
        run: |
          targets=$(ls fuzz/fuzz_targets/*.rs 2>/dev/null | xargs -I{} basename {} .rs)
          if [ -z "$targets" ]; then
            echo "No fuzz targets found."
            exit 0
          fi
          for target in $targets; do
            echo "Fuzzing: $target"
            cargo fuzz run "$target" -- -max_total_time=30
          done

  # ── AddressSanitizer + UBSan (scheduled only, nightly) ───────────────────────
  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: AddressSanitizer
        run: |
          RUSTFLAGS="-Z sanitizer=address" \
            cargo +nightly test -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            -p vvva_permissions -p vvva_js
      - name: UndefinedBehaviorSanitizer
        run: |
          RUSTFLAGS="-Z sanitizer=undefined" \
            cargo +nightly test -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            -p vvva_permissions -p vvva_js
