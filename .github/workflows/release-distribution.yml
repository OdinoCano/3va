name: Release Distribution

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v2.0.0)'
        required: true

permissions:
  contents: write   # commit Formula/ and bucket/ back to this repo

env:
  VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}

jobs:
  # ── Collect SHA256 hashes from the GitHub Release assets ─────────────────────
  collect-hashes:
    name: Collect SHA256 hashes
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'v'))
    outputs:
      linux_x64:    ${{ steps.hashes.outputs.linux_x64 }}
      linux_arm64:  ${{ steps.hashes.outputs.linux_arm64 }}
      darwin_x64:   ${{ steps.hashes.outputs.darwin_x64 }}
      darwin_arm64: ${{ steps.hashes.outputs.darwin_arm64 }}
      windows_x64:  ${{ steps.hashes.outputs.windows_x64 }}
      android_arm64: ${{ steps.hashes.outputs.android_arm64 }}
    steps:
      - name: Download .sha256 files via GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ env.VERSION }}"
          [[ "$VER" != v* ]] && VER="v${VER}"
          # gh release download uses the API — no CDN propagation delay.
          # Retry up to 5 times (30 s apart) in case the release was just created.
          for i in 1 2 3 4 5; do
            gh release download "$VER" \
              --repo OdinoCano/3va \
              --pattern "*.sha256" \
              --dir hashes/ && break
            echo "Attempt $i failed, retrying in 30s…"
            sleep 30
          done
          # Flatten to named files for the next step.
          VER="${{ env.VERSION }}"
          cp "hashes/3va-${VER}-x86_64-unknown-linux-gnu.tar.gz.sha256"    linux_x64.sha256
          cp "hashes/3va-${VER}-aarch64-unknown-linux-gnu.tar.gz.sha256"   linux_arm64.sha256
          cp "hashes/3va-${VER}-x86_64-apple-darwin.tar.gz.sha256"         darwin_x64.sha256
          cp "hashes/3va-${VER}-aarch64-apple-darwin.tar.gz.sha256"        darwin_arm64.sha256
          cp "hashes/3va-${VER}-x86_64-pc-windows-msvc.zip.sha256"              windows_x64.sha256
          cp "hashes/3va-${VER}-aarch64-linux-android.tar.gz.sha256"         android_arm64.sha256

      - name: Parse hashes
        id: hashes
        run: |
          echo "linux_x64=$(awk '{print $1}' linux_x64.sha256)"         >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(awk '{print $1}' linux_arm64.sha256)"     >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(awk '{print $1}' darwin_x64.sha256)"       >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(awk '{print $1}' darwin_arm64.sha256)"   >> "$GITHUB_OUTPUT"
          echo "windows_x64=$(awk '{print $1}' windows_x64.sha256)"     >> "$GITHUB_OUTPUT"
          echo "android_arm64=$(awk '{print $1}' android_arm64.sha256)" >> "$GITHUB_OUTPUT"

  # ── Publish to npm ────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: collect-hashes
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write  # for provenance attestations
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ env.VERSION }}
        run: |
          [[ "$VER" != v* ]] && VER="v${VER}"
          gh release download "$VER" \
            --repo OdinoCano/3va \
            --pattern "3va-${VER}-x86_64-unknown-linux-gnu.tar.gz" \
            --pattern "3va-${VER}-aarch64-unknown-linux-gnu.tar.gz" \
            --pattern "3va-${VER}-x86_64-apple-darwin.tar.gz" \
            --pattern "3va-${VER}-aarch64-apple-darwin.tar.gz" \
            --pattern "3va-${VER}-x86_64-pc-windows-msvc.zip" \
            --dir binaries/

      - name: Stage platform packages
        env:
          VER: ${{ env.VERSION }}
        run: |
          VER_BARE="${VER#v}"

          stage_tar() {
            local platform="$1" archive="$2"
            local dir="dist/npm/${platform}/bin"
            mkdir -p "$dir"
            tar xzf "binaries/${archive}" -C "$dir" 3va
            chmod +x "${dir}/3va"
            sed -i "s/PLATFORM_VERSION/${VER_BARE}/g" "dist/npm/${platform}/package.json"
          }

          stage_zip() {
            local platform="$1" archive="$2"
            local dir="dist/npm/${platform}/bin"
            mkdir -p "$dir"
            unzip "binaries/${archive}" 3va.exe -d "$dir"
            sed -i "s/PLATFORM_VERSION/${VER_BARE}/g" "dist/npm/${platform}/package.json"
          }

          stage_tar linux-x64    "3va-${VER}-x86_64-unknown-linux-gnu.tar.gz"
          stage_tar linux-arm64  "3va-${VER}-aarch64-unknown-linux-gnu.tar.gz"
          stage_tar darwin-x64   "3va-${VER}-x86_64-apple-darwin.tar.gz"
          stage_tar darwin-arm64 "3va-${VER}-aarch64-apple-darwin.tar.gz"
          stage_zip win32-x64    "3va-${VER}-x86_64-pc-windows-msvc.zip"

          sed -i "s/PLATFORM_VERSION/${VER_BARE}/g" dist/npm/hub/package.json

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VER: ${{ env.VERSION }}
        run: |
          VER_BARE="${VER#v}"
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            PKG_NAME="@edge_166/3va-${platform}"
            echo "--- checking ${PKG_NAME}@${VER_BARE} ---"
            if npm view "${PKG_NAME}@${VER_BARE}" version 2>/dev/null | grep -qF "${VER_BARE}"; then
              echo "${PKG_NAME}@${VER_BARE} already published — skipping."
            else
              npm publish "dist/npm/${platform}" --access public --provenance
            fi
          done

      - name: Publish hub package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VER: ${{ env.VERSION }}
        run: |
          VER_BARE="${VER#v}"
          echo "--- checking @edge_166/3va@${VER_BARE} ---"
          if npm view "@edge_166/3va@${VER_BARE}" version 2>/dev/null | grep -qF "${VER_BARE}"; then
            echo "@edge_166/3va@${VER_BARE} already published — skipping."
          else
            npm publish dist/npm/hub --access public --provenance
          fi

  # ── Update Formula/ and bucket/ in this repo ─────────────────────────────────
  update-homebrew-and-scoop:
    name: Update Formula and Scoop manifest
    needs: collect-hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the built-in token — no extra secrets needed.
          token: ${{ github.token }}

      - name: Generate Formula/3va.rb
        env:
          LINUX_X64:    ${{ needs.collect-hashes.outputs.linux_x64 }}
          LINUX_ARM64:  ${{ needs.collect-hashes.outputs.linux_arm64 }}
          DARWIN_X64:   ${{ needs.collect-hashes.outputs.darwin_x64 }}
          DARWIN_ARM64: ${{ needs.collect-hashes.outputs.darwin_arm64 }}
          VER: ${{ env.VERSION }}
        run: |
          VER_BARE="${VER#v}"
          cat > Formula/3va.rb <<FORMULA
          class ThreeVa < Formula
            desc "Secure-by-default JavaScript and TypeScript runtime. Deny-by-default permissions, no pm2 needed, post-install scripts blocked unconditionally."
            homepage "https://github.com/OdinoCano/3va"
            license "MIT"
            version "${VER_BARE}"

            on_macos do
              on_intel do
                url "https://github.com/OdinoCano/3va/releases/download/${VER}/3va-${VER}-x86_64-apple-darwin.tar.gz"
                sha256 "${DARWIN_X64}"
              end
              on_arm do
                url "https://github.com/OdinoCano/3va/releases/download/${VER}/3va-${VER}-aarch64-apple-darwin.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/OdinoCano/3va/releases/download/${VER}/3va-${VER}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X64}"
              end
              on_arm do
                url "https://github.com/OdinoCano/3va/releases/download/${VER}/3va-${VER}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64}"
              end
            end

            def install
              bin.install "3va"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/3va --version")
            end
          end
          FORMULA

      - name: Generate bucket/3va.json
        env:
          WINDOWS_X64: ${{ needs.collect-hashes.outputs.windows_x64 }}
          VER: ${{ env.VERSION }}
        run: |
          VER_BARE="${VER#v}"
          cat > bucket/3va.json <<JSON
          {
            "version": "${VER_BARE}",
            "description": "Secure-by-default JavaScript and TypeScript runtime. Deny-by-default permissions, no pm2 needed, post-install scripts blocked unconditionally. MIT license.",
            "homepage": "https://github.com/OdinoCano/3va",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/OdinoCano/3va/releases/download/${VER}/3va-${VER}-x86_64-pc-windows-msvc.zip",
                "hash": "${WINDOWS_X64}",
                "bin": "3va.exe"
              }
            },
            "checkver": {
              "github": "https://github.com/OdinoCano/3va",
              "regex": "v([\\d.]+)"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/OdinoCano/3va/releases/download/v\$version/3va-v\$version-x86_64-pc-windows-msvc.zip",
                  "hash": {
                    "url": "https://github.com/OdinoCano/3va/releases/download/v\$version/3va-v\$version-x86_64-pc-windows-msvc.zip.sha256",
                    "regex": "^([a-fA-F0-9]{64})"
                  }
                }
              }
            }
          }
          JSON

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/3va.rb bucket/3va.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update Formula and Scoop manifest for ${{ env.VERSION }}"
          git push origin HEAD:main

  # ── Publish to Chocolatey ────────────────────────────────────────────────────
  publish-chocolatey:
    name: Publish to Chocolatey
    needs: collect-hashes
    runs-on: windows-latest
    environment: chocolate
    env:
      CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Patch version and checksum into nuspec and install script
        env:
          WINDOWS_X64: ${{ needs.collect-hashes.outputs.windows_x64 }}
          VER: ${{ env.VERSION }}
        shell: pwsh
        run: |
          $VER_BARE = $env:VER -replace '^v', ''

          # Bump version in .nuspec
          (Get-Content dist\chocolatey\3va.nuspec) `
            -replace '<version>[^<]*</version>', "<version>$VER_BARE</version>" |
            Set-Content dist\chocolatey\3va.nuspec

          # Patch URL and checksum in install script
          $url = "https://github.com/OdinoCano/3va/releases/download/$env:VER/3va-$env:VER-x86_64-pc-windows-msvc.zip"
          (Get-Content dist\chocolatey\tools\chocolateyInstall.ps1) `
            -replace "version\s*=\s*'[^']*'", "version     = '$VER_BARE'" `
            -replace "url64\s*=\s*`"[^`"]*`"", "url64       = `"$url`"" `
            -replace 'checksum64\s*=\s*''[^'']*''', "checksum64  = '$($env:WINDOWS_X64)'" |
            Set-Content dist\chocolatey\tools\chocolateyInstall.ps1

      - name: Pack
        run: choco pack dist\chocolatey\3va.nuspec --out dist\chocolatey\

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          if (-not $env:CHOCO_API_KEY) {
            Write-Error "CHOCO_API_KEY secret is not set in the 'chocolate' environment."
            exit 1
          }
          $nupkg = "dist\chocolatey\3va.$($env:VERSION -replace '^v','').nupkg"
          $output = choco push $nupkg --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY 2>&1
          Write-Host $output
          # 403 on a new package ID = Chocolatey requires first-time submission via
          # the web portal (https://push.chocolatey.org/) before API pushes are
          # allowed.  Treat this as a warning, not a hard failure, so the rest of
          # the distribution jobs still succeed.
          if ($LASTEXITCODE -ne 0) {
            if ($output -match '403') {
              Write-Warning "choco push returned 403. If this is a new package ID, submit the .nupkg manually at https://push.chocolatey.org/ to get it approved. Subsequent version pushes will then work via this workflow."
              exit 0
            }
            exit $LASTEXITCODE
          }

  # ── Submit winget PR ──────────────────────────────────────────────────────────
  submit-winget:
    name: Submit winget PR
    needs: collect-hashes
    runs-on: windows-latest
    environment: winget
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install winget-create
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/winget-create/releases/latest/download/wingetcreate.exe"
          Invoke-WebRequest -Uri $url -OutFile wingetcreate.exe

      - name: Patch manifests and submit
        env:
          VER: ${{ env.VERSION }}
          WINDOWS_X64: ${{ needs.collect-hashes.outputs.windows_x64 }}
        shell: pwsh
        run: |
          $VER_BARE  = $env:VER -replace '^v', ''
          $URL       = "https://github.com/OdinoCano/3va/releases/download/$env:VER/3va-$env:VER-x86_64-pc-windows-msvc.zip"
          $SrcDir    = "dist\winget\manifests\o\OdinoCano\3va\2.0.0"
          $DestDir   = "dist\winget\manifests\o\OdinoCano\3va\$VER_BARE"

          # Copy manifests into a version-named folder and patch dynamic values.
          if ($VER_Bare -ne "2.0.0") {
            New-Item -ItemType Directory -Force -Path $DestDir | Out-Null
            Get-ChildItem $SrcDir | ForEach-Object {
              (Get-Content $_.FullName -Raw) `
                -replace 'PackageVersion: 2\.0\.0',              "PackageVersion: $VER_Bare" `
                -replace 'ReleaseDate: \d{4}-\d{2}-\d{2}',      "ReleaseDate: $(Get-Date -Format 'yyyy-MM-dd')" `
                -replace 'InstallerUrl: https://[^\r\n]+',       "InstallerUrl: $URL" `
                -replace 'InstallerSha256: [a-fA-F0-9]{64}',    "InstallerSha256: $($env:WINDOWS_X64)" |
                Set-Content "$DestDir\$($_.Name)"
            }
          }

          # wingetcreate submit works for both new packages and version updates.
          .\wingetcreate.exe submit "$DestDir" `
            --token $env:WINGET_TOKEN
