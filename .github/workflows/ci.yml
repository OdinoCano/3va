name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel previous runs for the same PR/branch to avoid wasted compute.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate 1: formatting ───────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Gate 2: lints ────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  # ── Gate 3: test suite ───────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  # ── Gate 4: dependency security & license audit ──────────────────────────────
  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  # ── Gate 5: fuzz build + short smoke run ─────────────────────────────────────
  fuzz:
    name: Fuzz (build + 30s smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          # ASAN requires the GNU (glibc) target; musl uses static libc which
          # is incompatible with sanitizers.
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> target
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo fuzz build --target x86_64-unknown-linux-gnu
        working-directory: fuzz
      - name: Smoke-run fuzz_target_1 (30 s)
        run: cargo fuzz run fuzz_target_1 --target x86_64-unknown-linux-gnu -- -max_total_time=30
        working-directory: fuzz
      - name: Smoke-run fuzz_permission_sandbox (30 s)
        run: cargo fuzz run fuzz_permission_sandbox --target x86_64-unknown-linux-gnu -- -max_total_time=30
        working-directory: fuzz
      - name: Smoke-run fuzz_pm_resolver (30 s)
        run: cargo fuzz run fuzz_pm_resolver --target x86_64-unknown-linux-gnu -- -max_total_time=30
        working-directory: fuzz

  # ── Gate 6: secret scanning ──────────────────────────────────────────────────
  secrets:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
