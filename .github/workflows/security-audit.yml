name: Security Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    outputs:
      has_vulns: ${{ steps.check.outputs.has_vulns }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tools
        run: |
          cargo install --locked cargo-audit 2>/dev/null || true
          cargo install --locked cargo-deny  2>/dev/null || true

      - name: Run cargo audit
        id: check
        shell: bash
        run: |
          # Write output to file to avoid $GITHUB_OUTPUT multiline issues
          cargo audit 2>&1 | tee audit-output.txt || true
          cargo deny check advisories bans licenses 2>&1 | tee -a audit-output.txt || true

          if grep -qE "^error" audit-output.txt; then
            echo "has_vulns=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_vulns=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload audit output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: audit-output.txt
          retention-days: 7

      - name: Open GitHub Issue on failure (scheduled runs only)
        if: |
          github.event_name == 'schedule' &&
          steps.check.outputs.has_vulns == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('audit-output.txt', 'utf8');
            const week = new Date().toISOString().slice(0, 10);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed — ${week}`,
              body: [
                '## Security Audit Failed',
                '',
                'Automated `cargo audit` / `cargo deny` detected vulnerabilities.',
                '',
                '### Output',
                '```',
                output.slice(0, 6000),
                '```',
                '',
                '**Actions required:**',
                '1. Run `cargo audit` locally and update affected crates',
                '2. Re-push to main — this workflow re-runs on every push',
                '3. Close this issue once the audit passes',
                '',
                '*Auto-generated by the security-audit workflow.*',
              ].join('\n'),
              labels: ['security', 'automated'],
            });

  fail-on-vulns:
    name: Fail if vulnerabilities found
    needs: audit
    runs-on: ubuntu-latest
    if: needs.audit.outputs.has_vulns == 'true'
    steps:
      - name: Fail
        run: |
          echo "::error::Vulnerabilities detected — see audit-output artifact or GitHub Issue."
          exit 1
