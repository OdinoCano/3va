name: Security Audit

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: cargo, rustc

      - name: Run cargo audit
        run: |
          cargo install --locked cargo-audit || true
          cargo audit --deny warnings --fetch-index-retries 5 || true
        continue-on-error: true

      - name: Run cargo deny
        run: |
          cargo install --locked cargo-deny || true
          cargo deny check advisories bans licenses || true
        continue-on-error: true

      - name: Check for new vulnerabilities
        id: check_vulns
        run: |
          AUDIT_OUTPUT=$(cargo audit 2>&1 || true)
          echo "audit_output=${AUDIT_OUTPUT}" >> "$GITHUB_OUTPUT"

          # Check if there are vulnerabilities
          if echo "$AUDIT_OUTPUT" | grep -q "error:"; then
            echo "has_vulns=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_vulns=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Issue on failure (scheduled run only)
        if: |
          github.event_name == 'schedule' &&
          steps.check_vulns.outputs.has_vulns == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const auditOutput = process.env.AUDIT_OUTPUT || '';
            const week = new Date().toISOString().split('W')[0];

            const issueBody = `
            ## Security Audit Failed — Week ${week}

            Automated security audit detected vulnerabilities in the dependency tree.

            ### Audit Output
            \`\`\`
            ${auditOutput.substring(0, 6000)}
            \`\`\`

            ### Required Actions
            1. Review the vulnerabilities above
            2. Update affected dependencies via \`cargo update\`
            3. Re-run this audit to verify fixes
            4. Close this issue once resolved

            ---
            *This issue was automatically created by the security-audit workflow.*
            `.trim();

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed — Week ${week}`,
              body: issueBody,
              labels: ['security', 'automated']
            });

            console.log(`Created issue #${issue.data.number}`);

  # ── Fail the workflow if there are vulnerabilities ─────────────────────────
  audit-result:
    name: Audit Result
    needs: security-audit
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.security-audit.result == 'success' &&
      needs.security-audit.outputs.has_vulns == 'true'
    steps:
      - name: Fail on vulnerabilities
        run: |
          echo "Vulnerabilities detected in dependencies. Please review the GitHub issue."
          exit 1
