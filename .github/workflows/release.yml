name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.0.0)"
        required: true

permissions:
  contents: write   # create GitHub releases and upload assets
  id-token: write   # needed for OIDC/keyless signing and SLSA provenance

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # On tag push github.ref_name is the tag; on workflow_dispatch use the input.
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ── Build precompiled binaries ────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — native and cross via cross Docker image.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          # macos-13 is deprecated (fully unsupported Dec 2025) — long queues.
          # macos-14 (M1) is the current runner. Xcode 15 is pinned explicitly
          # because libffi-sys 2.3.0 (wasmtime dep) fails with Xcode 16's
          # stricter CFI validation on arm64 Mach-O assembly.
          - target: aarch64-apple-darwin
            os: macos-14
            xcode: '15.4'
          - target: x86_64-apple-darwin
            os: macos-14
            xcode: '15.4'
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          # Android / Termux — API 24 (Android 7.0) covers ~99 % of active devices.
          # cargo-ndk sets up the NDK linker and sysroot automatically.
          - target: aarch64-linux-android
            os: ubuntu-latest
            ndk: true
            ndk_api: 24

    steps:
      - uses: actions/checkout@v4

      - name: Create swap space (avoid OOM on resource-constrained runners)
        if: runner.os == 'Linux'
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(free -h | grep Swap)"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Select Xcode version (macOS only)
        if: matrix.xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Setup Android NDK
        if: matrix.ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Install cargo-ndk
        if: matrix.ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # NOTE: --locked ensures reproducible builds by using Cargo.lock as committed.
      - name: Build (Android NDK)
        if: matrix.ndk
        run: cargo ndk --target ${{ matrix.target }} --platform ${{ matrix.ndk_api }} -- build --release --locked --bin 3va

      - name: Build (cross, aarch64-linux)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin 3va

      - name: Build (native / macOS cross)
        if: ${{ !matrix.cross && !matrix.ndk }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin 3va

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="3va-${VERSION}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/3va" 3va
          tar czf "${ARCHIVE}" 3va
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ env.RELEASE_TAG }}"
          $TARGET  = "${{ matrix.target }}"
          $ARCHIVE = "3va-${VERSION}-${TARGET}.zip"
          Copy-Item "target\${TARGET}\release\3va.exe" 3va.exe
          Compress-Archive -Path 3va.exe -DestinationPath $ARCHIVE
          (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower() + "  $ARCHIVE" | Out-File "${ARCHIVE}.sha256" -Encoding ascii
          "ARCHIVE=$ARCHIVE" | Out-File -Append $Env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  # ── Collect hashes for SLSA provenance ───────────────────────────────────────
  hash:
    name: Collect artifact hashes
    needs: build
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute base64 SHA-256 subjects
        id: hash
        shell: bash
        run: |
          cd artifacts
          HASHES=$(sha256sum *.tar.gz *.zip 2>/dev/null | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"

  # ── SLSA Level 2 Provenance ───────────────────────────────────────────────────
  # Reusable workflow — must be referenced at the job level (jobs.<id>.uses),
  # not inside steps. See: https://github.com/slsa-framework/slsa-github-generator
  provenance:
    name: SLSA Provenance
    needs: hash
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.hash.outputs.hashes }}"
      upload-assets: false   # we upload in github-release job

  # ── Sign binaries with cosign (keyless OIDC) ─────────────────────────────────
  sign:
    name: Sign binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries (keyless via OIDC)
        shell: bash
        run: |
          cd binaries
          for ARCHIVE in *.tar.gz *.zip; do
            [ -f "$ARCHIVE" ] || continue
            cosign sign-blob --yes "$ARCHIVE" \
              --bundle "${ARCHIVE}.bundle"
          done

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: binaries/*.bundle
          retention-days: 5

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build, provenance, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (for Termux install script)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Copy Termux install script
        run: cp dist/termux/install.sh release-assets/termux-install.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**
          tag_name: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io (token from GitHub environment secret) ──────────────
  publish:
    name: Publish crates
    needs: github-release
    runs-on: ubuntu-latest
    environment: crates-io   # secret CARGO_REGISTRY_TOKEN lives here
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Publish in strict dependency order.  publish_crate() skips a crate that
      # is already on the index (safe to re-run after a partial failure) and
      # waits 60 s between publishes to stay within the crates.io rate limit
      # for new crates (see https://crates.io/docs/rate-limits).
      - name: Publish all crates
        run: |
          publish_crate() {
            local pkg="$1"
            local out
            out=$(cargo publish --package "$pkg" --allow-dirty 2>&1) && { echo "$out"; return 0; }
            echo "$out"
            echo "$out" | grep -q "already exists" && { echo "↳ $pkg already published, skipping."; return 0; }
            return 1
          }

          publish_crate vvva-rquickjs-sys  && sleep 60
          publish_crate vvva-rquickjs-core && sleep 60
          publish_crate vvva-rquickjs      && sleep 60
          publish_crate vvva_permissions   && sleep 60
          publish_crate vvva_config        && sleep 60
          publish_crate vvva_core          && sleep 60
          publish_crate vvva_crypto        && sleep 60
          publish_crate vvva_firewall      && sleep 60
          publish_crate vvva_pm            && sleep 60
          publish_crate vvva_js            && sleep 60
          publish_crate vvva_wasm          && sleep 60
          publish_crate vvva_bundler       && sleep 60
          publish_crate vvva_test          && sleep 60
          publish_crate vvva_cli
