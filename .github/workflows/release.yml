name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write   # create GitHub releases and upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build precompiled binaries ────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # gnu targets: the ubuntu runner has libssl-dev so no OpenSSL setup needed.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true   # cross Docker image includes OpenSSL + aarch64 gcc
          # Disabled: macOS runners queue for hours with no progress.
          - target: x86_64-apple-darwin
            os: macos-13
          # Build arm64 on the Intel (macos-13 / Xcode 15) runner via cross-
          # compilation.  Xcode 16 on macos-latest rejects the .cfi_def_cfa
          # register-name syntax in libffi-sys 2.3.0's bundled arm64 assembly;
          # Xcode 15 accepts it fine.
          - target: aarch64-apple-darwin
            os: macos-13
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross, aarch64-linux)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin 3va

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --bin 3va

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="3va-${VERSION}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/3va" 3va
          tar czf "${ARCHIVE}" 3va
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $TARGET  = "${{ matrix.target }}"
          $ARCHIVE = "3va-${VERSION}-${TARGET}.zip"
          Copy-Item "target\${TARGET}\release\3va.exe" 3va.exe
          Compress-Archive -Path 3va.exe -DestinationPath $ARCHIVE
          (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower() + "  $ARCHIVE" | Out-File "${ARCHIVE}.sha256" -Encoding ascii
          "ARCHIVE=$ARCHIVE" | Out-File -Append $Env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**

  # ── Publish to crates.io (token from GitHub environment secret) ──────────────
  publish:
    name: Publish crates
    needs: github-release
    runs-on: ubuntu-latest
    environment: crates-io   # secret CARGO_REGISTRY_TOKEN lives here
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Publish in strict dependency order.  publish_crate() skips a crate that
      # is already on the index (safe to re-run after a partial failure) and
      # waits 60 s between publishes to stay within the crates.io rate limit
      # for new crates (see https://crates.io/docs/rate-limits).
      - name: Publish all crates
        run: |
          publish_crate() {
            local pkg="$1"
            local out
            out=$(cargo publish --package "$pkg" --allow-dirty 2>&1) && { echo "$out"; return 0; }
            echo "$out"
            echo "$out" | grep -q "already exists" && { echo "↳ $pkg already published, skipping."; return 0; }
            return 1
          }

          publish_crate vvva-rquickjs-sys  && sleep 60
          publish_crate vvva-rquickjs-core && sleep 60
          publish_crate vvva-rquickjs      && sleep 60
          publish_crate vvva_permissions   && sleep 60
          publish_crate vvva_config        && sleep 60
          publish_crate vvva_core          && sleep 60
          publish_crate vvva_crypto        && sleep 60
          publish_crate vvva_firewall      && sleep 60
          publish_crate vvva_pm            && sleep 60
          publish_crate vvva_js            && sleep 60
          publish_crate vvva_wasm          && sleep 60
          publish_crate vvva_bundler       && sleep 60
          publish_crate vvva_test          && sleep 60
          publish_crate vvva_cli
