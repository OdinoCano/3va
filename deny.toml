[advisories]
ignore = [
    "RUSTSEC-2023-0051",
    "RUSTSEC-2024-0370",
    # fxhash is unmaintained; pulled in as transitive dep by wasmtime — no active CVE
    "RUSTSEC-2025-0057",
    # rsa: Marvin Attack (timing side-channel). No fix available.
    # Only exploitable by attacker with network access measuring many signing ops.
    # 3va is a CLI tool — RSA ops happen locally with user-owned keys, not exposed remotely.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    # inferno (flamegraph generator) uses CDDL-1.0 — copyleft scoped to
    # file-level modifications, comparable to MPL-2.0 already allowed above.
    "CDDL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = [
    { name = "bitflags", version = "1" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
