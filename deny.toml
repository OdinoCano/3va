[advisories]
ignore = [
    "RUSTSEC-2023-0051",
    "RUSTSEC-2024-0370",
    # fxhash is unmaintained; pulled in as transitive dep by wasmtime — no active CVE
    "RUSTSEC-2025-0057",
    # rustls-pemfile: no longer maintained; pulled in as transitive dep by tonic.
    # No safe upgrade available. The crate is a thin wrapper around rustls-pki-types
    # (included since 1.9.0). Migration to PemObject API requires tonic update.
    "RUSTSEC-2025-0134",
    # rsa 0.9: Marvin Attack (PKCS#1 v1.5 decryption timing oracle, CVE-2023-49092).
    # 3va uses rsa ONLY for signing (createSign) and verification (createVerify).
    # RsaPrivateKey::decrypt() is never called — the vulnerable code path is unreachable.
    # Fix: rsa 0.10.0-rc.18 exists but requires digest 0.11 + rand_core 0.10, which are
    # not yet stable in the RustCrypto ecosystem (sha2/sha1 still at 0.10). Migrate when
    # rsa 0.10 stable is released. Track: https://github.com/RustCrypto/RSA/issues/19
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
    # inferno (flamegraph generator) uses CDDL-1.0 — copyleft scoped to
    # file-level modifications, comparable to MPL-2.0 already allowed above.
    "CDDL-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
deny = []
skip = [
    { name = "bitflags",      version = "1" },
    # RustCrypto ecosystem split: rsa 0.9 uses digest 0.10 / der 0.7 / const-oid 0.9;
    # ml-kem / ml-dsa use the newer digest 0.11 / der 0.8 / const-oid 0.10 series.
    # Both trees are needed until rsa 0.10 stable is released.
    { name = "block-buffer",  version = "0.10" },
    { name = "const-oid",     version = "0.9" },
    { name = "crypto-common", version = "0.1" },
    { name = "der",           version = "0.7" },
    { name = "digest",        version = "0.10" },
    # cpufeatures: 0.2 from sha2/aes, 0.3 from ml-kem
    { name = "cpufeatures",   version = "0.2" },
    # core-foundation: 0.9 from native-tls, 0.10 from newer macOS deps
    { name = "core-foundation", version = "0.9" },
    # getrandom: 0.2 from rand 0.8, 0.3 from ml-kem, 0.4 from crypto-bigint (rsa 0.10 rc path)
    { name = "getrandom",     version = "0.2" },
    { name = "getrandom",     version = "0.3" },
    # hashbrown: multiple versions pulled by different hashmap-heavy crates
    { name = "hashbrown",     version = "0.14" },
    { name = "hashbrown",     version = "0.15" },
    # windows-sys: 0.48 from mio 0.8 (notify), 0.52 from cap-std, 0.60/0.61 from wasmtime
    { name = "windows-sys",   version = "0.48" },
    { name = "windows-sys",   version = "0.52" },
    # winnow: 0.5 from toml_edit 0.19 (rquickjs-macro via proc-macro-crate), 0.7 from toml 0.8
    { name = "winnow",        version = "0.5" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
