name: vvva-cli
base: core24
version: 'v2.1.3'
summary: Secure-by-default JavaScript and TypeScript runtime.
description: |
  3va is a JavaScript and TypeScript runtime built on QuickJS with
  capability-based sandboxing, post-quantum cryptography (ML-KEM / ML-DSA),
  and WebAssembly support.

  Every permission — filesystem, network, environment variables, subprocess
  execution — is denied by default and must be explicitly granted per script.
  Post-install scripts are blocked unconditionally.
  Built-in process supervisor; no pm2 required. MIT licensed.
title: vvva-cli
license: MIT
contact: https://github.com/OdinoCano/3va/issues
issues: https://github.com/OdinoCano/3va/issues
source-code: https://github.com/OdinoCano/3va
website: https://github.com/OdinoCano/3va

grade: stable
confinement: strict

# Strict confinement mirrors 3va's deny-by-default philosophy at the
# distribution layer.  Scripts that need real filesystem or network access
# must use 3va's own permission flags; the snap does not pre-grant anything
# beyond what the runtime itself requires to execute.
apps:
  3va:
    command: bin/3va
    plugs:
      - home
      - network
      - network-bind

parts:
  3va:
    plugin: dump
    source: ../../target/release/
    organize:
      3va: bin/3va
