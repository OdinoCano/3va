app-id: com.github.OdinoCano.3va
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: 3va

# 3va enforces deny-by-default permissions at the script level.
# The Flatpak sandbox mirrors this philosophy: no host filesystem access,
# no network access, and no session bus access are granted to the installer.
# Users who run scripts that require network or filesystem access grant those
# permissions explicitly via 3va's own permission flags, not via Flatpak
# finish-args.
finish-args:
  - --filesystem=home
  - --share=network

modules:
  - name: 3va
    buildsystem: simple
    build-commands:
      - install -Dm755 3va /app/bin/3va
    sources:
      - type: archive
        url: https://github.com/OdinoCano/3va/releases/download/v2.1.0/3va-v2.1.0-x86_64-unknown-linux-gnu.tar.gz
        sha256: ddfd46aee3b0b86d448c7fa5e94ae902b28acfb707089db17a53720e2521f27f
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/OdinoCano/3va/releases/download/v2.1.0/3va-v2.1.0-aarch64-unknown-linux-gnu.tar.gz
        sha256: 1d825a34203ed2d9d16bbdea7daa74644a5b29bb0df63602b00bb1801b968f6d
        only-arches:
          - aarch64
